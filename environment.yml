name: ai-ids
channels:
  - pytorch
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pytorch::pytorch::*[version='>=2.0.1']
  - pytorch::pytorch-cuda=11.8
  - pytorch::torchvision
  - pytorch::torchaudio
  - pip
  - jupyter
  - jupyterlab
  - ipython
  - matplotlib
  - seaborn
  - pandas
  - numpy
  - scipy
  - scikit-learn
  - pip:
    - fastapi==0.103.1
    - uvicorn==0.23.2
    - pydantic==2.3.0
    - kafka-python==2.0.2
    - streamlit==1.28.1
    - plotly==5.17.0
    - shap==0.42.1
    - lime==0.2.0
    - xgboost==2.0.0
    - lightgbm==4.0.0
    - imbalanced-learn==0.11.0
    - joblib==1.3.1
    - pyyaml==6.0.1
    - python-dotenv==1.0.0
    - tqdm==4.66.1
